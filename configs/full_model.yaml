experiment:
  name: full_model_corrected_loss
  task: active_fire
  seeds: [41, 42, 43, 44, 45]
  output_root: results/training_runs/full_model_corrected_loss
data:
  splits:
    train: splits/train_event_ids.txt
    validation: splits/validation_event_ids.txt
    test: splits/test_event_ids.txt
  metadata:
    dataset_version: metadata/dataset_version.txt
    channel_order: metadata/channel_order.json
    normalization: metadata/normalization_statistics.json
    preprocessing: metadata/preprocessing_config.yaml
  required_sample_manifest: ${SAMPLE_MANIFEST}
  preprocessed_root: ${TS_SATFIRE_DATA_ROOT}
model:
  name: swin_convlstm
  input_channels: 8
  output_classes: 2
  feature_size: 96
  hidden_dim: 64
  attention: dcbam
  pretrained_weights: ${SWIN_PRETRAINED_PATH}
loss:
  name: masked_hybrid
  tversky_weight: 0.4
  focal_weight: 0.3
  cross_entropy_weight: 0.3
  alpha: 0.5
  beta: 0.5
  gamma: 3.0
  selection_grid:
    - {alpha: 0.5, beta: 0.5}
    - {alpha: 0.4, beta: 0.6}
    - {alpha: 0.3, beta: 0.7}
selection_policy: choose alpha/beta and threshold from validation only, then freeze before test
training:
  batch_size: 1
  learning_rate: 0.0001
  num_heads: 4
  sequence_length: 10
  interval: 3
  max_epochs: 100
  patience: 15
  grad_clip: 1.0
  scheduler: cosine_restart_decay
  wandb:
    mode: online
    project: swinfire_jei_resubmission_v2
    entity: null  # Uses the authenticated W&B account; never commit a personal entity.
    required_for_final_metrics: true
